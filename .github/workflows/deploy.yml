name: Build and Deploy Container

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout Github Action'
        uses: actions/checkout@v4

      - name: 'Login to Azure'
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: 'Build and push image'
        run: |
          docker build -t your-registry.azurecr.io/backend-app:latest ./backend
          docker push your-registry.azurecr.io/backend-app:latest

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'your-app-service-name'
          images: 'your-registry.azurecr.io/backend-app:latest'
